<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 Peptide Planner · Cass & Mike</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
  :root {
    --bg:#080c14; --surface:#0f1623; --s2:#161f2e; --border:#1e2d40;
    --accent:#00d4aa; --a2:#8b7cf8; --warn:#f59e0b; --danger:#ef4444;
    --text:#dde4f0; --muted:#556070; --green:#22c55e; --blue:#4da6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}

  /* HEADER */
  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px 0;position:sticky;top:0;z-index:100;}
  .hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .hdr-top h1{font-size:18px;font-weight:800;color:var(--accent);}
  .hdr-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .today-pill{margin-left:auto;background:rgba(0,212,170,.1);border:1px solid var(--accent);color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;padding:4px 12px;border-radius:100px;}
  .tabs{display:flex;gap:2px;}
  .tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;padding:8px 16px 10px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.8px;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* LAYOUT */
  .main{padding:20px 28px;max-width:1360px;margin:0 auto;}
  .vp{display:none;} .vp.active{display:block;}
  .slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
  .dual{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  /* BANNER */
  .banner{border-radius:8px;padding:10px 14px;margin-bottom:16px;font-family:'DM Mono',monospace;font-size:12px;}
  .banner.warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-left:3px solid var(--warn);color:var(--warn);}
  .banner.load{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);border-left:3px solid var(--danger);color:#f87171;}

  /* PERSON CARDS */
  .pcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .phead{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .phead.cass{background:linear-gradient(90deg,rgba(0,212,170,.07),transparent);}
  .phead.mike{background:linear-gradient(90deg,rgba(77,166,255,.07),transparent);}
  .phead-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;}
  .phead.cass .phead-name{color:var(--accent);}
  .phead.mike .phead-name{color:var(--blue);}
  .pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

  /* DOSE ROWS */
  .dlist{padding:4px 0;}
  .drow{display:grid;grid-template-columns:24px 140px 1fr auto;align-items:center;padding:7px 14px;border-bottom:1px solid rgba(30,45,64,.5);gap:8px;transition:background .1s;cursor:pointer;}
  .drow:last-child{border-bottom:none;}
  .drow:hover{background:var(--s2);}
  .drow.done{opacity:.45;}
  .drow.done .dtick .tk{color:var(--muted);}
  .chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .drow.done .chk{background:var(--accent);border-color:var(--accent);}
  .chk-mark{font-size:10px;color:#080c14;display:none;}
  .drow.done .chk-mark{display:block;}
  .dname{font-size:12px;font-weight:700;}
  .dtick{font-family:'DM Mono',monospace;font-size:13px;}
  .dtick .tk{color:var(--accent);font-weight:500;}
  .dtick .mg{color:var(--muted);font-size:11px;}
  .dtime{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
  .t-early{background:rgba(34,197,94,.12);color:#4ade80;}
  .t-mid{background:rgba(245,158,11,.12);color:var(--warn);}
  .t-eve{background:rgba(139,124,248,.12);color:var(--a2);}
  .t-night{background:rgba(77,166,255,.12);color:var(--blue);}
  .t-sun{background:rgba(0,212,170,.10);color:var(--accent);}
  .t-load{background:rgba(239,68,68,.12);color:#f87171;}

  /* PROGRESS BAR */
  .prog-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;}
  .prog-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .prog-bars{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .prog-item{}
  .prog-name{font-size:11px;font-weight:700;margin-bottom:5px;}
  .prog-track{background:var(--s2);border-radius:100px;height:6px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:100px;transition:width .4s ease;background:var(--accent);}
  .prog-fill.mike{background:var(--blue);}
  .prog-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}

  /* WEEK GRAPH */
  .graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;}
  .graph-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .graph-bars{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;align-items:end;height:80px;}
  .g-col{display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;}
  .g-bar-wrap{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;}
  .g-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .4s;}
  .g-bar.cass-bar{background:var(--accent);}
  .g-bar.mike-bar{background:var(--blue);}
  .g-day{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;}
  .g-today .g-day{color:var(--accent);}

  /* WEEK STRIP */
  .wk-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px;}
  .wday{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;}
  .wday:hover{border-color:var(--accent);}
  .wday.today{border-color:var(--accent);background:rgba(0,212,170,.06);}
  .wday.sel{border-color:var(--a2);background:rgba(139,124,248,.07);}
  .wday-name{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .wday-num{font-size:22px;font-weight:800;margin:3px 0;}
  .wday.today .wday-num{color:var(--accent);}
  .wday-pct{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

  /* PROTOCOL TABLE */
  .ptable{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .pt-head{display:grid;grid-template-columns:170px 1fr 1fr 80px;padding:10px 16px;background:var(--s2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
  .ptrow{display:grid;grid-template-columns:170px 1fr 1fr 80px;padding:11px 16px;gap:8px;border-bottom:1px solid var(--border);align-items:center;transition:background .1s;}
  .ptrow:last-child{border-bottom:none;}
  .ptrow:hover{background:var(--s2);}
  .pt-name{font-size:13px;font-weight:700;}
  .pt-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
  .pt-dose{font-family:'DM Mono',monospace;font-size:12px;}
  .ct{color:var(--accent);} .bt{color:var(--blue);} .dm{color:var(--muted);}
  .who{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
  .who-both{background:rgba(0,212,170,.12);color:var(--accent);}
  .who-cass{background:rgba(139,124,248,.12);color:var(--a2);}

  /* PREP GRID */
  .prep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .prep-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start;}
  .prep-card.recon{border-color:var(--blue);background:rgba(77,166,255,.04);}
  .prep-card.ok{border-color:var(--green);background:rgba(34,197,94,.04);}
  .prep-icon{font-size:18px;}
  .prep-name{font-size:12px;font-weight:700;}
  .prep-note{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;}

  /* PRICING */
  .price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .price-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .price-name{font-size:12px;font-weight:700;color:var(--accent);}
  .price-code{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
  .price-val{font-family:'DM Mono',monospace;font-size:18px;margin-top:8px;}
  .price-unit{font-size:10px;color:var(--muted);}

  @media(max-width:860px){
    .dual{grid-template-columns:1fr;}
    .prep-grid{grid-template-columns:1fr 1fr;}
    .price-grid{grid-template-columns:1fr 1fr;}
    .main{padding:14px;}
    .hdr{padding:12px 14px 0;}
    .prog-bars{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <h1>🧬 Peptide Planner</h1>
    <span class="hdr-meta" id="hMeta"></span>
    <span class="today-pill" id="hPill"></span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="sw('today',this)">Today</button>
    <button class="tab" onclick="sw('week',this)">This Week</button>
    <button class="tab" onclick="sw('tracker',this)">Tracker</button>
    <button class="tab" onclick="sw('protocol',this)">Protocol</button>
    <button class="tab" onclick="sw('sunday',this)">Sunday Prep</button>
    <button class="tab" onclick="sw('pricing',this)">Reorder</button>
  </div>
</div>

<div class="main">

  <!-- TODAY -->
  <div id="tab-today" class="vp active">
    <div id="todayBanners"></div>
    <div class="prog-wrap" style="margin-bottom:16px;">
      <div class="prog-label">Today's Progress</div>
      <div class="prog-bars">
        <div class="prog-item">
          <div class="prog-name" style="color:var(--accent)">Cassidy</div>
          <div class="prog-track"><div class="prog-fill" id="cassBar" style="width:0%"></div></div>
          <div class="prog-num" id="cassNum">0 / 0 doses</div>
        </div>
        <div class="prog-item">
          <div class="prog-name" style="color:var(--blue)">Mike</div>
          <div class="prog-track"><div class="prog-fill mike" id="mikeBar" style="width:0%"></div></div>
          <div class="prog-num" id="mikeNum">0 / 0 doses</div>
        </div>
      </div>
    </div>
    <div class="dual">
      <div class="pcard">
        <div class="phead cass">
          <span class="phead-name">Cassidy</span>
          <span class="pct" id="cassPct">0%</span>
        </div>
        <div class="dlist" id="cassToday"></div>
      </div>
      <div class="pcard">
        <div class="phead mike">
          <span class="phead-name">Mike</span>
          <span class="pct" id="mikePct">0%</span>
        </div>
        <div class="dlist" id="mikeToday"></div>
      </div>
    </div>
  </div>

  <!-- WEEK -->
  <div id="tab-week" class="vp">
    <div class="slabel">Week of <span id="wkRange"></span></div>
    <div class="wk-strip" id="wkStrip"></div>
    <div id="wkDetail"></div>
  </div>

  <!-- TRACKER -->
  <div id="tab-tracker" class="vp">
    <div class="slabel" style="margin-bottom:14px">7-Day Completion</div>
    <div class="graph-wrap">
      <div class="graph-title">● Cass <span style="color:var(--blue);margin-left:12px">● Mike</span></div>
      <div class="graph-bars" id="graphBars"></div>
    </div>
    <div class="slabel" style="margin-bottom:10px">Log History</div>
    <div id="historyList" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;"></div>
  </div>

  <!-- PROTOCOL -->
  <div id="tab-protocol" class="vp">
    <div class="slabel" style="margin-bottom:14px">Full Protocol · May 2026</div>
    <div class="ptable">
      <div class="pt-head"><span>Peptide</span><span>Cassidy</span><span>Mike</span><span>Who</span></div>
      <div id="protoRows"></div>
    </div>
  </div>

  <!-- SUNDAY PREP -->
  <div id="tab-sunday" class="vp">
    <div class="slabel" style="margin-bottom:14px">Sunday Prep — Next: <span id="nextSun"></span></div>
    <div class="prep-grid" id="prepGrid"></div>
  </div>

  <!-- PRICING -->
  <div id="tab-pricing" class="vp">
    <div class="slabel" style="margin-bottom:14px">Reorder Reference · ANLV Pricing</div>
    <div class="price-grid" id="priceGrid"></div>
  </div>

</div>

<script>
const TODAY = new Date();
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const MT2_LOAD_START  = new Date(2026,4,4);
const MT2_LOAD_END    = new Date(2026,4,14);
const MT2_MAINT_START = new Date(2026,4,16);
const PIN_START       = new Date(2026,4,18);
const PIN_END         = new Date(2026,4,27);
const MOTS_START      = new Date(2026,4,18);
const MT2_LOAD_DAYS   = [4,6,8,10,12,14].map(d => new Date(2026,4,d).toDateString());

const WEEKDAY = [
  {name:"KPV",     c:{t:"15t",mg:"0.75mg"},m:{t:"15t",mg:"0.75mg"},time:"night"},
  {name:"CJC/Ipam",c:{t:"6t", mg:"0.20mg"},m:{t:"15t",mg:"0.50mg"},time:"night"},
  {name:"DSIP",    c:{t:"6t", mg:"0.3mg"}, m:{t:"6t", mg:"0.3mg"}, time:"night"},
  {name:"Semax",   c:{t:"1 spray/nostril",mg:""},m:{t:"1 spray/nostril",mg:""},time:"early"},
  {name:"Selank",  c:{t:"12t",mg:"0.4mg"}, m:{t:"12t",mg:"0.4mg"}, time:"early"},
  {name:"Glow70",  c:{t:"15t",mg:"3.5mg"}, m:{t:"15t",mg:"3.5mg"}, time:"early"},
];
const ALT = {
  1:[{name:"SS-31",c:{t:"30t",mg:"1.0mg"},m:{t:"30t",mg:"1.0mg"},time:"early"}],
  2:[{name:"NAD+", c:{t:"50t",mg:"50mg"}, m:{t:"50t",mg:"50mg"}, time:"early"}],
  3:[{name:"SS-31",c:{t:"30t",mg:"1.0mg"},m:{t:"30t",mg:"1.0mg"},time:"early"}],
  4:[{name:"NAD+", c:{t:"50t",mg:"50mg"}, m:{t:"50t",mg:"50mg"}, time:"early"}],
  5:[{name:"SS-31",c:{t:"30t",mg:"1.0mg"},m:{t:"30t",mg:"1.0mg"},time:"early"}],
};
const SAT_C = [{name:"SS-31 (recon)",t:"30t",mg:"1.0mg",time:"mid",note:"Mid AM · recon day"}];
const SAT_M = [{name:"SS-31 (recon)",t:"30t",mg:"1.0mg",time:"mid",note:"Mid AM · recon day"}];
const SUN_C = [
  {name:"Retatrutide",t:"15t", mg:"0.5mg", time:"sun",note:"After waking"},
  {name:"Glutathione",t:"100t",mg:"200mg", time:"sun",note:"30min after Reta"},
  {name:"NAD+",       t:"50t", mg:"50mg",  time:"mid",note:"Mid AM · prep day"},
];
const SUN_M = [
  {name:"Retatrutide",t:"15t", mg:"0.5mg", time:"sun",note:"After waking"},
  {name:"Glutathione",t:"100t",mg:"200mg", time:"sun",note:"30min after Reta"},
  {name:"NAD+",       t:"50t", mg:"50mg",  time:"mid",note:"Mid AM · prep day"},
];

function getDoses(date) {
  const dow=date.getDay(), ds=date.toDateString();
  const inPin=date>=PIN_START&&date<=PIN_END, inMots=date>=MOTS_START;
  const isMT2Load=MT2_LOAD_DAYS.includes(ds), isMT2Maint=date>=MT2_MAINT_START&&dow===6;
  const res={c:[],m:[]};
  if(dow===6){
    SAT_C.forEach(d=>res.c.push({...d})); SAT_M.forEach(d=>res.m.push({...d}));
    if(isMT2Maint) res.c.push({name:"MT2",t:"5t",mg:"0.25mg",time:"eve",note:"Sat maintenance · Cass only"});
    if(inPin){res.c.push({name:"Pinealon",t:"10t",mg:"0.20mg",time:"early"});res.m.push({name:"Pinealon",t:"10t",mg:"0.20mg",time:"early"});}
    return res;
  }
  if(dow===0){
    SUN_C.forEach(d=>res.c.push({...d})); SUN_M.forEach(d=>res.m.push({...d}));
    if(isMT2Load) res.c.push({name:"MT2 🔶 LOADING",t:"10t",mg:"0.50mg",time:"load",note:"EOD · Cass only · Evening"});
    if(inPin){res.c.push({name:"Pinealon",t:"10t",mg:"0.20mg",time:"early"});res.m.push({name:"Pinealon",t:"10t",mg:"0.20mg",time:"early"});}
    return res;
  }
  WEEKDAY.forEach(d=>{res.c.push({name:d.name,t:d.c.t,mg:d.c.mg,time:d.time});res.m.push({name:d.name,t:d.m.t,mg:d.m.mg,time:d.time});});
  if(ALT[dow]) ALT[dow].forEach(d=>{res.c.push({name:d.name,t:d.c.t,mg:d.c.mg,time:d.time});res.m.push({name:d.name,t:d.m.t,mg:d.m.mg,time:d.time});});
  if(isMT2Load) res.c.push({name:"MT2 🔶 LOADING",t:"10t",mg:"0.50mg",time:"load",note:"EOD · Cass only · Evening"});
  if(inPin){res.c.push({name:"Pinealon",t:"10t",mg:"0.20mg",time:"early"});res.m.push({name:"Pinealon",t:"10t",mg:"0.20mg",time:"early"});}
  if(inMots){res.c.push({name:"MOTS-c",t:"10t",mg:"0.5mg",time:"early"});res.m.push({name:"MOTS-c",t:"10t",mg:"0.5mg",time:"early"});}
  return res;
}

const STORE_KEY='pp_doses_v1';
function getStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return{};}}
function saveStore(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}}
function doseKey(date,person,name){return`${date.toDateString()}|${person}|${name}`;}
function isDone(date,person,name){return!!getStore()[doseKey(date,person,name)];}
function toggleDose(date,person,name){const s=getStore(),k=doseKey(date,person,name);if(s[k])delete s[k];else s[k]=Date.now();saveStore(s);}

const TL={early:"Early AM",mid:"Mid AM",eve:"Evening",night:"Night",sun:"Sun · Late Start",load:"Evening · LOADING"};
const TC={early:"t-early",mid:"t-mid",eve:"t-eve",night:"t-night",sun:"t-sun",load:"t-load"};

function doseRow(d,date,person,interactive){
  const done=interactive?isDone(date,person,d.name):false;
  const tick=d.mg?`<span class="tk">${d.t}</span> <span class="mg">· ${d.mg}</span>`:`<span class="tk">${d.t}</span>`;
  const note=d.note?` · ${d.note}`:'';
  const onclick=interactive?`onclick="tap(this,'${date.toDateString()}','${person}','${d.name.replace(/'/g,"\\'")}')"`:'';
  return`<div class="drow ${done?'done':''}" ${onclick}><div class="chk"><span class="chk-mark">✓</span></div><div class="dname">${d.name}</div><div class="dtick">${tick}</div><div class="dtime ${TC[d.time]||''}">${TL[d.time]||d.time}${note}</div></div>`;
}

function personList(arr,date,person,interactive){
  return arr.length?arr.map(d=>doseRow(d,date,person,interactive)).join(''):`<div class="drow"><div></div><div class="dname" style="color:var(--muted)">No doses scheduled</div></div>`;
}

function calcPct(arr,date,person){
  if(!arr.length)return 0;
  return Math.round((arr.filter(d=>isDone(date,person,d.name)).length/arr.length)*100);
}

function tap(el,dateStr,person,name){
  const date=new Date(dateStr);
  toggleDose(date,person,name);
  el.classList.toggle('done');
  const mark=el.querySelector('.chk-mark');
  if(mark)mark.style.display=el.classList.contains('done')?'block':'none';
  updateProgress(); updateGraph();
}

function updateProgress(){
  const d=getDoses(TODAY);
  const cp=calcPct(d.c,TODAY,'c'), mp=calcPct(d.m,TODAY,'m');
  const cd=d.c.filter(x=>isDone(TODAY,'c',x.name)).length;
  const md=d.m.filter(x=>isDone(TODAY,'m',x.name)).length;
  document.getElementById('cassBar').style.width=cp+'%';
  document.getElementById('mikeBar').style.width=mp+'%';
  document.getElementById('cassNum').textContent=`${cd} / ${d.c.length} doses`;
  document.getElementById('mikeNum').textContent=`${md} / ${d.m.length} doses`;
  document.getElementById('cassPct').textContent=cp+'%';
  document.getElementById('mikePct').textContent=mp+'%';
}

function initToday(){
  const dow=TODAY.getDay();
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('hMeta').textContent=`${DAYS[dow]} · ${months[TODAY.getMonth()]} ${TODAY.getDate()}, ${TODAY.getFullYear()} · Cassidy & Mike`;
  document.getElementById('hPill').textContent=`${DAYS[dow].toUpperCase()} ${TODAY.getMonth()+1}/${TODAY.getDate()}`;
  const banners=[];
  const ds=TODAY.toDateString();
  if(MT2_LOAD_DAYS.includes(ds)){
    const doseNum=MT2_LOAD_DAYS.indexOf(ds)+1;
    banners.push(`<div class="banner load">🔶 MT2 Loading — Dose ${doseNum} of 6 tonight · 10t · 0.50mg · Evening · Cass only · Loading completes May 14</div>`);
  }
  if(TODAY<PIN_START) banners.push(`<div class="banner warn">⏳ Pinealon + MOTS-c start May 18</div>`);
  document.getElementById('todayBanners').innerHTML=banners.join('');
  const d=getDoses(TODAY);
  document.getElementById('cassToday').innerHTML=personList(d.c,TODAY,'c',true);
  document.getElementById('mikeToday').innerHTML=personList(d.m,TODAY,'m',true);
  updateProgress();
}

let selDay=new Date(TODAY);

function initWeek(){
  const sun=new Date(TODAY); sun.setDate(TODAY.getDate()-TODAY.getDay());
  const sat=new Date(sun); sat.setDate(sun.getDate()+6);
  document.getElementById('wkRange').textContent=`${sun.getMonth()+1}/${sun.getDate()} – ${sat.getMonth()+1}/${sat.getDate()}`;
  renderStrip(); showDay(selDay);
}

function renderStrip(){
  const sun=new Date(TODAY); sun.setDate(TODAY.getDate()-TODAY.getDay());
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(sun); d.setDate(sun.getDate()+i);
    const isT=d.toDateString()===TODAY.toDateString(), isS=d.toDateString()===selDay.toDateString();
    const doses=getDoses(d), cp=calcPct(doses.c,d,'c');
    html+=`<div class="wday ${isT?'today':''} ${isS?'sel':''}" onclick="showDay(new Date(${d.getFullYear()},${d.getMonth()},${d.getDate()}))"><div class="wday-name">${DAYS[d.getDay()]}</div><div class="wday-num">${d.getDate()}</div><div class="wday-pct">${cp?cp+'%':doses.c.length+'d'}</div></div>`;
  }
  document.getElementById('wkStrip').innerHTML=html;
}

function showDay(date){
  selDay=date; renderStrip();
  const d=getDoses(date);
  document.getElementById('wkDetail').innerHTML=`<div class="slabel">${DAYS[date.getDay()]} ${date.getMonth()+1}/${date.getDate()}</div><div class="dual" style="margin-top:10px"><div class="pcard"><div class="phead cass"><span class="phead-name">Cassidy</span></div><div class="dlist">${personList(d.c,date,'c',false)}</div></div><div class="pcard"><div class="phead mike"><span class="phead-name">Mike</span></div><div class="dlist">${personList(d.m,date,'m',false)}</div></div></div>`;
}

function updateGraph(){
  const bars=document.getElementById('graphBars'); if(!bars)return;
  let html='';
  for(let i=6;i>=0;i--){
    const d=new Date(TODAY); d.setDate(TODAY.getDate()-i);
    const doses=getDoses(d), cp=calcPct(doses.c,d,'c'), mp=calcPct(doses.m,d,'m');
    html+=`<div class="g-col ${i===0?'g-today':''}"><div class="g-bar-wrap" style="display:flex;flex-direction:column;justify-content:flex-end;gap:2px;height:100%;"><div class="g-bar cass-bar" style="height:${cp}%"></div><div class="g-bar mike-bar" style="height:${mp}%"></div></div><div class="g-day">${DAYS[d.getDay()].slice(0,2)}</div></div>`;
  }
  bars.innerHTML=html;
  const hist=document.getElementById('historyList'); if(!hist)return;
  const store=getStore(), entries=Object.entries(store).sort((a,b)=>b[1]-a[1]).slice(0,30);
  if(!entries.length){hist.innerHTML=`<div style="padding:16px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;">No doses logged yet — tap doses on Today tab to track</div>`;return;}
  hist.innerHTML=entries.map(([k,ts])=>{
    const[dateStr,person,name]=k.split('|'), t=new Date(ts), timeStr=t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return`<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);"><span style="font-size:10px;background:${person==='c'?'rgba(0,212,170,.12)':'rgba(77,166,255,.12)'};color:${person==='c'?'var(--accent)':'var(--blue)'};padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-weight:700;">${person==='c'?'CASS':'MIKE'}</span><span style="font-size:13px;font-weight:700;flex:1">${name}</span><span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${dateStr} · ${timeStr}</span></div>`;
  }).join('');
}

function sw(tab,btn){
